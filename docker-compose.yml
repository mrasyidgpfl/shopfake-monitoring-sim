version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopfake
      POSTGRES_PASSWORD: shopfake
      POSTGRES_DB: shopfake
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - simulator
      - processor
      - gateway

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafdata:/var/lib/grafana
    depends_on:
      - prometheus

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: shopfake-events
    ports:
      - "2112:2112"

  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: shopfake-events
      POSTGRES_DSN: postgres://shopfake:shopfake@postgres:5432/shopfake?sslmode=disable
      GRPC_PORT: "50051"
    ports:
      - "2113:2113"
      - "50051:50051"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      - processor
    environment:
      GRPC_ADDR: processor:50051
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
  grafdata: